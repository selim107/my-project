<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign up form</title>
</head>
<body>
    <h2>Sign up form</h2>
    <hr>
    <form>
<h3><label for="First Name"> First Name:</label> <br></h3>
<input type="text" id="First Name" placeholder="enter your first name" required>
<br>

<h3><label for="Last Name"> Last Name:</label><br></h3>
<input type="text" id="Last Name" placeholder="enter your last name" required>
<br>

<h3><label for="email">email:</label><br></h3>
<input type="email" id="email" placeholder="enter your email" required>
<br>

<h3><label for="Phone">Phone:</label><br></h3>
<input type="phone" id="Phone" placeholder="enter your phone number">
<br>

<h3><label for="password">password:</label><br></h3>
<input type="password" id="password" placeholder="enter your password">
<br>

<h3><label for="confirm password">confirm password:</label><br></h3>
<input type="password" id="password" placeholder="confirm password">
<br>

<h3><label for="dob">date of birth:</label><br></h3>
<input type="date" id="dob">
<br>
<h3><label for="gender">gender:</label><br></h3>

<input type="radio" id="male" name="gender">
<label for="male">Male</label>

<input type="radio" id="Female" name="gender">
<label for="female">Female</label>

<input type="radio" id="other" name="gender">
<label for="other">Other</label>
<br>

<h3><label for="skill">Skill:</label><br></h3>

<input type="checkbox" id="html">
        <label for="html">HTML</label>

        <input type="checkbox" id="css">
        <label for="css">CSS</label>

        <input type="checkbox" id="js">
        <label for="js">JavaScript</label>
<br>


    </form>
    <h2>Go To Index Page</h2><br>
    <a href="index.html">Go to index page</a>
</body>
</html>
